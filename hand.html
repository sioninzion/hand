<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손 인식 랜드마크</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
      color: white;
    }

    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #status {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    #title {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.5);
      font-size: 14px;
      color: #dfffe7;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="status">카메라 준비 중...</div>
    <div id="title">손가락 끝 · 손바닥 마디 · 손바닥 중앙 · 손목 표시</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusBox = document.getElementById("status");

    const fingertipIds = [4, 8, 12, 16, 20];
    const baseJointIds = [1, 5, 9, 13, 17];
    const wristId = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function toCanvasPoint(landmark) {
      return {
        x: landmark.x * canvas.width,
        y: landmark.y * canvas.height
      };
    }

    function getPalmCenter(landmarks) {
      const ids = [0, 5, 9, 13, 17];
      let x = 0;
      let y = 0;

      ids.forEach(id => {
        x += landmarks[id].x;
        y += landmarks[id].y;
      });

      return {
        x: (x / ids.length) * canvas.width,
        y: (y / ids.length) * canvas.height
      };
    }

    function drawPoint(point, size = 7) {
      ctx.beginPath();
      ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(0, 255, 100, 0.9)";
      ctx.stroke();
    }

    function drawLine(a, b) {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(0, 255, 100, 0.9)";
      ctx.stroke();
    }

    function drawHand(landmarks) {
      const wrist = toCanvasPoint(landmarks[wristId]);
      const palmCenter = getPalmCenter(landmarks);

      drawLine(wrist, palmCenter);

      for (let i = 0; i < 5; i++) {
        const base = toCanvasPoint(landmarks[baseJointIds[i]]);
        const tip = toCanvasPoint(landmarks[fingertipIds[i]]);

        drawLine(palmCenter, base);
        drawLine(base, tip);

        drawPoint(base, 7);
        drawPoint(tip, 7);
      }

      drawPoint(wrist, 8);
      drawPoint(palmCenter, 9);
    }

    function onResults(results) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        statusBox.textContent = "손을 카메라에 비춰주세요";
        return;
      }

      statusBox.textContent = "손 인식 중";

      results.multiHandLandmarks.forEach(handLandmarks => {
        drawHand(handLandmarks);
      });
    }

    const hands = new Hands({
      locateFile: file => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.65
    });

    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
      },
      width: 1280,
      height: 720
    });

    camera.start()
      .then(() => {
        statusBox.textContent = "카메라 실행 완료";
      })
      .catch(() => {
        statusBox.textContent = "카메라 권한을 허용해 주세요";
      });
  </script>
</body>
</html>
