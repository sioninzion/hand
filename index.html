<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Sound ver 1.3</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

#wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

#version {
  position: absolute;
  top: 10px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
  opacity: 0.9;
}

#statusPanel {
  position: absolute;
  top: 32px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
}

#status {
  padding: 7px 11px;
  border-radius: 999px;
  background: rgba(0,0,0,0.4);
  margin-bottom: 8px;
}

#playBtn {
  border: 1px solid rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.14);
  color: white;
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
}

#playBtn.on {
  background: rgba(0,255,110,0.28);
  border-color: rgba(0,255,120,0.9);
}

#pitchBar {
  position: absolute;
  right: 24px;
  top: 20%;
  width: 8px;
  height: 60%;
  z-index: 25;
  background: rgba(255,255,255,0.88);
  border-radius: 999px;
  box-shadow: 0 0 18px rgba(255,255,255,0.55);
}

#pitchDot {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 22px;
  height: 22px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 18px rgba(0,255,120,0.9);
}

#octaveBox {
  position: absolute;
  right: 45px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 30;
  color: white;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,0,0,0.45);
}

#domainText {
  position: absolute;
  left: 50%;
  top: 34%;
  transform: translate(-50%, -50%);
  z-index: 5;
  color: rgba(255,255,255,0.92);
  font-size: clamp(30px, 8vw, 92px);
  font-weight: 900;
  white-space: nowrap;
  opacity: 0;
  text-shadow:
    0 0 10px rgba(80,180,255,0.95),
    0 0 25px rgba(50,140,255,0.8),
    0 0 60px rgba(0,80,255,0.65);
  transition: opacity 0.18s ease, transform 0.18s ease;
  pointer-events: none;
}

#domainText.active {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.04);
}

#flash {
  position: absolute;
  inset: 0;
  z-index: 4;
  background:
    radial-gradient(circle at center, rgba(80,170,255,0.22), transparent 45%),
    radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 25%);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}

#flash.active {
  opacity: 1;
  animation: pulse 1.4s infinite ease-in-out;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.08); opacity: 0.85; }
}
</style>
</head>

<body>
<div id="wrap">
  <video id="video" autoplay playsinline></video>

  <div id="flash"></div>
  <div id="domainText">영역전개: 무량공처</div>

  <div id="pitchBar">
    <div id="pitchDot"></div>
  </div>
  <div id="octaveBox">옥타브 x1</div>

  <canvas id="canvas"></canvas>

  <div id="version">ver 1.3</div>

  <div id="statusPanel">
    <div id="status">손을 카메라에 비춰주세요</div>
    <button id="playBtn">연주</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");
const domainText = document.getElementById("domainText");
const flash = document.getElementById("flash");
const playBtn = document.getElementById("playBtn");
const pitchDot = document.getElementById("pitchDot");
const octaveBox = document.getElementById("octaveBox");

const fingertipIds = [4, 8, 12, 16, 20];
const baseJointIds = [1, 5, 9, 13, 17];

let gestureHold = 0;
let gestureLost = 0;

let audioCtx = null;
let osc = null;
let gain = null;
let playMode = false;
let currentFreq = 440;
let octaveLevel = 0;

let leftSnapReady = true;
let rightSnapReady = true;
let lastLeftSnapTime = 0;
let lastRightSnapTime = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function point(lm) {
  return {
    x: lm.x * canvas.width,
    y: lm.y * canvas.height
  };
}

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function drawPoint(p, r = 7) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function drawLine(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function palmCenter(landmarks) {
  const ids = [0, 5, 9, 13, 17];
  let x = 0, y = 0;
  ids.forEach(id => {
    x += landmarks[id].x;
    y += landmarks[id].y;
  });
  return {
    x: (x / ids.length) * canvas.width,
    y: (y / ids.length) * canvas.height
  };
}

function drawHand(landmarks) {
  const wrist = point(landmarks[0]);
  const center = palmCenter(landmarks);

  drawLine(wrist, center);

  for (let i = 0; i < 5; i++) {
    const base = point(landmarks[baseJointIds[i]]);
    const tip = point(landmarks[fingertipIds[i]]);

    drawLine(center, base);
    drawLine(base, tip);

    drawPoint(base, 6);
    drawPoint(tip, 7);
  }

  drawPoint(wrist, 7);
  drawPoint(center, 9);
}

function isFingerUp(landmarks, tipId, pipId) {
  return landmarks[tipId].y < landmarks[pipId].y;
}

function detectDomainGesture(landmarks) {
  const thumbTip = point(landmarks[4]);
  const indexTip = point(landmarks[8]);
  const middleTip = point(landmarks[12]);
  const wrist = point(landmarks[0]);
  const indexBase = point(landmarks[5]);
  const handSize = Math.max(dist(wrist, indexBase), 1);

  const indexUp = isFingerUp(landmarks, 8, 6);
  const middleUp = isFingerUp(landmarks, 12, 10);
  const ringDown = !isFingerUp(landmarks, 16, 14);
  const pinkyDown = !isFingerUp(landmarks, 20, 18);

  return (
    indexUp &&
    middleUp &&
    ringDown &&
    pinkyDown &&
    dist(indexTip, middleTip) < handSize * 1.65 &&
    dist(thumbTip, indexTip) < handSize * 2.25
  );
}

function setDomainActive(active) {
  domainText.classList.toggle("active", active);
  flash.classList.toggle("active", active);
}

function initAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = currentFreq;

  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
}

function setSound(active) {
  if (!audioCtx || !gain) return;

  const now = audioCtx.currentTime;
  const target = active ? 0.12 : 0;

  gain.gain.cancelScheduledValues(now);
  gain.gain.setTargetAtTime(target, now, 0.03);
}

function setFrequency(freq) {
  currentFreq = freq;
  if (osc && audioCtx) {
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.035);
  }
}

function yToFrequency(y) {
  const minFreq = 180;
  const maxFreq = 880;

  const t = 1 - Math.min(Math.max(y / canvas.height, 0), 1);
  const baseFreq = minFreq + (maxFreq - minFreq) * t;

  return baseFreq * Math.pow(2, octaveLevel);
}

function updatePitchBar(y) {
  const top = 0.2;
  const height = 0.6;

  const clamped = Math.min(Math.max(y / canvas.height, top), top + height);
  const local = (clamped - top) / height;

  pitchDot.style.top = `${local * 100}%`;
}

function detectStrictPinch(landmarks) {
  const thumbTip = point(landmarks[4]);
  const indexTip = point(landmarks[8]);
  const wrist = point(landmarks[0]);
  const indexBase = point(landmarks[5]);
  const handSize = Math.max(dist(wrist, indexBase), 1);

  return dist(thumbTip, indexTip) < handSize * 0.42;
}

function detectSnapPose(landmarks) {
  const thumbTip = point(landmarks[4]);
  const middleTip = point(landmarks[12]);
  const indexTip = point(landmarks[8]);
  const wrist = point(landmarks[0]);
  const middleBase = point(landmarks[9]);
  const handSize = Math.max(dist(wrist, middleBase), 1);

  const thumbMiddleClose = dist(thumbTip, middleTip) < handSize * 0.55;
  const indexAway = dist(indexTip, thumbTip) > handSize * 0.65;

  return thumbMiddleClose && indexAway;
}

function handleSnap(side, snapNow) {
  const now = Date.now();

  if (side === "left") {
    if (!snapNow) {
      leftSnapReady = true;
      return;
    }

    if (snapNow && leftSnapReady && now - lastLeftSnapTime > 700) {
      octaveLevel = Math.min(octaveLevel + 1, 2);
      leftSnapReady = false;
      lastLeftSnapTime = now;
      updateOctaveText();
    }
  }

  if (side === "right") {
    if (!snapNow) {
      rightSnapReady = true;
      return;
    }

    if (snapNow && rightSnapReady && now - lastRightSnapTime > 700) {
      octaveLevel = Math.max(octaveLevel - 1, -2);
      rightSnapReady = false;
      lastRightSnapTime = now;
      updateOctaveText();
    }
  }
}

function updateOctaveText() {
  const multi = Math.pow(2, octaveLevel);

  if (octaveLevel === 0) {
    octaveBox.textContent = "옥타브 x1";
  } else if (octaveLevel > 0) {
    octaveBox.textContent = `옥타브 x${multi}`;
  } else {
    octaveBox.textContent = `옥타브 x1/${Math.pow(2, Math.abs(octaveLevel))}`;
  }
}

function isLeftSideHand(landmarks) {
  const wrist = point(landmarks[0]);
  return wrist.x < canvas.width * 0.5;
}

function isRightSideHand(landmarks) {
  const wrist = point(landmarks[0]);
  return wrist.x >= canvas.width * 0.5;
}

playBtn.addEventListener("click", async () => {
  initAudio();

  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }

  playMode = !playMode;
  playBtn.classList.toggle("on", playMode);
  playBtn.textContent = playMode ? "연주 중" : "연주";

  if (!playMode) {
    setSound(false);
  }
});

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let domainDetected = false;
  let leftIndexY = null;
  let rightPinch = false;
  let leftSnap = false;
  let rightSnap = false;

  const handsList = results.multiHandLandmarks || [];

  handsList.forEach(hand => {
    drawHand(hand);

    if (detectDomainGesture(hand)) {
      domainDetected = true;
    }

    if (isLeftSideHand(hand)) {
      leftIndexY = point(hand[8]).y;
      leftSnap = detectSnapPose(hand);
    }

    if (isRightSideHand(hand)) {
      rightPinch = detectStrictPinch(hand);
      rightSnap = detectSnapPose(hand);
    }
  });

  handleSnap("left", leftSnap);
  handleSnap("right", rightSnap);

  if (leftIndexY !== null) {
    const freq = yToFrequency(leftIndexY);
    setFrequency(freq);
    updatePitchBar(leftIndexY);
  }

  const shouldSound = playMode && leftIndexY !== null && rightPinch;
  setSound(shouldSound);

  if (domainDetected) {
    gestureHold++;
    gestureLost = 0;
  } else {
    gestureLost++;
    if (gestureLost > 4) gestureHold = 0;
  }

  const domainActive = gestureHold >= 3;
  setDomainActive(domainActive);

  if (handsList.length === 0) {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  } else if (shouldSound) {
    statusBox.textContent = `연주 중 · ${Math.round(currentFreq)}Hz`;
  } else if (playMode) {
    statusBox.textContent = "오른손 엄지+검지를 완전히 붙이면 소리";
  } else if (domainActive) {
    statusBox.textContent = "영역전개 감지됨";
  } else {
    statusBox.textContent = "손동작 인식 중";
  }
}

const hands = new Hands({
  locateFile: file => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.65
});

hands.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start()
  .then(() => {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  })
  .catch(() => {
    statusBox.textContent = "카메라 권한을 허용해 주세요";
  });
</script>
</body>
</html>
