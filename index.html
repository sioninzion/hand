<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>HandSound ver.1</title>
<style>
:root{
  --bg:#050506;
  --panel:rgba(12,13,18,.62);
  --line:rgba(255,255,255,.18);
  --text:#f5f7fb;
  --muted:#b8bdc9;
  --blue:#48a8ff;
  --purple:#8954d9;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#app{position:fixed;inset:0;background:radial-gradient(circle at 50% 20%,#151622,#020203 70%)}
video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#video{opacity:0}
#draw{z-index:2}
#shade{position:absolute;inset:0;z-index:3;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.25));pointer-events:none}
#top{
  position:absolute;left:18px;top:14px;z-index:10;display:flex;gap:10px;align-items:center
}
.logo{
  width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#1b1e2d,#5836a3);
  display:grid;place-items:center;box-shadow:0 10px 30px rgba(0,0,0,.45);font-weight:900
}
.title{line-height:1.05}
.title b{font-size:20px;letter-spacing:.2px}
.title small{display:block;color:var(--muted);font-size:11px;margin-top:4px}
#credit{
  position:absolute;right:16px;top:16px;z-index:10;text-align:right;
  background:rgba(0,0,0,.42);border:1px solid var(--line);border-radius:12px;padding:8px 10px;
  backdrop-filter:blur(10px);font-size:12px
}
#credit b{display:block;font-size:13px}
#credit span{display:block;color:#d9d9e8;font-size:10px;margin-top:3px;letter-spacing:.4px}
#start{
  position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 40%,rgba(86,74,184,.35),rgba(0,0,0,.86) 62%);
}
.startCard{
  width:min(92vw,420px);padding:28px;border-radius:28px;background:rgba(10,11,18,.72);
  border:1px solid rgba(255,255,255,.18);box-shadow:0 30px 80px rgba(0,0,0,.7);text-align:center;backdrop-filter:blur(16px)
}
.startCard h1{margin:0;font-size:34px}
.startCard p{color:var(--muted);line-height:1.5;margin:14px 0 22px}
button{
  border:0;border-radius:18px;padding:14px 18px;background:#fff;color:#07070a;font-weight:900;font-size:15px;cursor:pointer
}
button:active{transform:scale(.98)}
#hud{
  position:absolute;right:14px;top:82px;z-index:9;width:168px;padding:10px 11px;border-radius:14px;
  background:rgba(0,0,0,.48);border:1px solid var(--line);backdrop-filter:blur(10px);
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#ecf3ff
}
.row{display:flex;justify-content:space-between;gap:12px;margin:3px 0}
.row span:first-child{color:#aeb7c8}
#dial{
  position:absolute;left:28px;bottom:118px;z-index:8;width:230px;height:230px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,0,.72) 0 25%,rgba(255,255,255,.08) 26% 100%);
  border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);box-shadow:0 22px 60px rgba(0,0,0,.45)
}
.seg{position:absolute;inset:0;border-radius:50%;display:grid;place-items:center;color:#ddd;font-size:13px;font-weight:800;opacity:.82}
.seg:nth-child(1){clip-path:polygon(50% 50%,0 0,50% 0)}
.seg:nth-child(2){clip-path:polygon(50% 50%,50% 0,100% 0,100% 35%)}
.seg:nth-child(3){clip-path:polygon(50% 50%,100% 35%,100% 100%,70% 100%)}
.seg:nth-child(4){clip-path:polygon(50% 50%,70% 100%,30% 100%,0 70%)}
.seg:nth-child(5){clip-path:polygon(50% 50%,0 70%,0 0)}
.seg.active{background:rgba(138,83,218,.76);opacity:1}
.seg label{position:absolute}
.seg:nth-child(1) label{top:30px;left:105px}
.seg:nth-child(2) label{top:80px;right:24px}
.seg:nth-child(3) label{bottom:50px;right:38px}
.seg:nth-child(4) label{bottom:34px;left:58px}
.seg:nth-child(5) label{top:88px;left:30px}
.dialCenter{
  position:absolute;left:50%;top:50%;translate:-50% -50%;width:82px;height:82px;border-radius:50%;
  background:#050509;border:1px solid rgba(255,255,255,.16);display:grid;place-items:center;
  font-size:12px;color:#bfc4d0;font-weight:900
}
#keys{
  position:absolute;left:50%;bottom:28px;translate:-50% 0;z-index:8;width:min(92vw,820px);height:96px;
  display:flex;align-items:stretch;gap:3px;padding:10px;border-radius:18px;
  background:rgba(10,11,18,.58);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px)
}
.key{
  flex:1;border-radius:3px;background:rgba(255,255,255,.16);position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,.08)
}
.key.black{background:rgba(85,54,142,.72)}
.key.active{background:var(--blue);box-shadow:0 0 22px rgba(72,168,255,.75)}
.key span{position:absolute;left:50%;bottom:7px;translate:-50% 0;font-size:10px;color:#eaf3ff;font-weight:800}
#pointer{
  position:absolute;z-index:12;width:28px;height:28px;border-radius:50%;border:3px solid rgba(255,255,255,.85);
  background:rgba(72,168,255,.85);box-shadow:0 0 24px rgba(72,168,255,.9);translate:-50% -50%;display:none;pointer-events:none
}
#pointer::after{content:"MELODY";position:absolute;left:24px;top:2px;font-size:9px;font-weight:900;color:#dcecff;text-shadow:0 1px 6px #000}
#cross{
  position:absolute;z-index:7;width:120px;height:120px;border:1px solid rgba(255,255,255,.18);border-radius:50%;
  left:50%;top:50%;translate:-50% -50%;pointer-events:none
}
#cross:before,#cross:after{content:"";position:absolute;background:rgba(255,255,255,.32)}
#cross:before{width:1px;height:120px;left:50%;top:0}
#cross:after{height:1px;width:120px;left:0;top:50%}
#controls{
  position:absolute;left:50%;bottom:132px;translate:-50% 0;z-index:9;display:flex;gap:8px;align-items:center;
  padding:7px 10px;border-radius:14px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px)
}
select,.mini{
  background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.16);border-radius:9px;
  padding:6px 8px;font-size:11px;font-weight:800
}
option{background:#111;color:white}
#msg{
  position:absolute;left:50%;top:50%;translate:-50% -50%;z-index:15;padding:12px 16px;border-radius:16px;
  background:rgba(0,0,0,.55);border:1px solid var(--line);color:#fff;display:none
}
@media(max-width:720px){
  #dial{width:165px;height:165px;left:12px;bottom:126px}
  .dialCenter{width:58px;height:58px;font-size:10px}
  .seg{font-size:10px}
  .seg:nth-child(1) label{top:20px;left:74px}
  .seg:nth-child(2) label{top:55px;right:16px}
  .seg:nth-child(3) label{bottom:36px;right:25px}
  .seg:nth-child(4) label{bottom:24px;left:40px}
  .seg:nth-child(5) label{top:62px;left:18px}
  #hud{right:8px;top:76px;width:144px;font-size:10px}
  #controls{bottom:132px;max-width:94vw;overflow:auto}
  #keys{height:84px}
}
</style>
</head>
<body>
<div id="app">
  <video id="video" playsinline></video>
  <canvas id="draw"></canvas>
  <div id="shade"></div>

  <div id="top">
    <div class="logo">HS</div>
    <div class="title"><b>HandSound</b><small>gesture synth system</small></div>
  </div>

  <div id="credit"><b>ver.1</b><span>made by. SIONINZION</span></div>

  <div id="hud">
    <div class="row"><span>Melody</span><b id="hMelody">--</b></div>
    <div class="row"><span>Volume</span><b id="hVolume">0%</b></div>
    <div class="row"><span>Pitch</span><b id="hPitch">-- Hz</b></div>
    <div class="row"><span>Chord</span><b id="hChord">OFF</b></div>
    <div class="row"><span>Hands</span><b id="hHands">0</b></div>
  </div>

  <div id="dial">
    <div class="seg active" data-mode="off"><label>OFF</label></div>
    <div class="seg" data-mode="major"><label>Major</label></div>
    <div class="seg" data-mode="minor"><label>Minor</label></div>
    <div class="seg" data-mode="chord"><label>Chord</label></div>
    <div class="seg" data-mode="scale"><label>Scale</label></div>
    <div class="dialCenter" id="dialText">OFF</div>
  </div>

  <div id="controls">
    <select id="wave">
      <option value="sine">Wave Sine</option>
      <option value="square" selected>Wave Square</option>
      <option value="triangle">Wave Triangle</option>
      <option value="sawtooth">Wave Saw</option>
    </select>
    <select id="range">
      <option value="1">Range 1 oct</option>
      <option value="2" selected>Range 2 oct</option>
      <option value="3">Range 3 oct</option>
    </select>
    <button class="mini" id="holdBtn">HOLD OFF</button>
  </div>

  <div id="keys"></div>
  <div id="pointer"></div>
  <div id="cross"></div>
  <div id="msg">카메라를 준비하는 중...</div>

  <div id="start">
    <div class="startCard">
      <h1>HandSound ver.1</h1>
      <p>손가락 위치로 음을 만들고, 손 모양으로 멜로디/코드 느낌을 바꾸는 실시간 제스처 악기입니다.</p>
      <button id="startBtn">시작하기</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('draw');
const ctx = canvas.getContext('2d');
const keysEl = document.getElementById('keys');
const pointer = document.getElementById('pointer');
const msg = document.getElementById('msg');
const waveSel = document.getElementById('wave');
const rangeSel = document.getElementById('range');
const holdBtn = document.getElementById('holdBtn');

const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let notes = [];
for(let midi=48;midi<=72;midi++){
  const name = noteNames[midi%12] + Math.floor(midi/12-1);
  notes.push({midi,name,freq:440*Math.pow(2,(midi-69)/12)});
}
notes.forEach(n=>{
  const div=document.createElement('div');
  div.className='key '+(n.name.includes('#')?'black':'');
  div.dataset.midi=n.midi;
  div.innerHTML='<span>'+n.name.replace('#','♯')+'</span>';
  keysEl.appendChild(div);
});

let audioCtx, osc, gain, chordOscs=[];
let currentMidi=null, currentMode='off', hold=false, lastSound=0;

function showMsg(t){msg.textContent=t;msg.style.display='block'}
function hideMsg(){msg.style.display='none'}

function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(!osc){
    gain=audioCtx.createGain();
    gain.gain.value=0;
    gain.connect(audioCtx.destination);
    osc=audioCtx.createOscillator();
    osc.type=waveSel.value;
    osc.frequency.value=220;
    osc.connect(gain);
    osc.start();
  }
}
function setMainSound(freq,vol){
  ensureAudio();
  osc.type=waveSel.value;
  osc.frequency.setTargetAtTime(freq,audioCtx.currentTime,.015);
  gain.gain.setTargetAtTime(vol,audioCtx.currentTime,.02);
}
function stopChord(){
  chordOscs.forEach(o=>{try{o.gain.gain.setTargetAtTime(0,audioCtx.currentTime,.025);setTimeout(()=>o.osc.stop(),80)}catch(e){}});
  chordOscs=[];
}
function playChord(rootFreq, minor=false){
  ensureAudio();
  stopChord();
  const ratios = minor ? [1, Math.pow(2,3/12), Math.pow(2,7/12)] : [1, Math.pow(2,4/12), Math.pow(2,7/12)];
  ratios.forEach(r=>{
    const g=audioCtx.createGain(); g.gain.value=.055;
    const o=audioCtx.createOscillator(); o.type=waveSel.value; o.frequency.value=rootFreq*r;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    chordOscs.push({osc:o,gain:g});
  });
}

function setActiveKey(midi){
  document.querySelectorAll('.key').forEach(k=>k.classList.toggle('active', Number(k.dataset.midi)===midi));
}
function midiFromY(y){
  const range=Number(rangeSel.value);
  const min=48, max=48+12*range;
  const midi=Math.round(max-(y*(max-min)));
  return Math.max(48,Math.min(72,midi));
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function isPinch(lm){return dist(lm[4],lm[8])<0.045}
function fingersOpen(lm){
  let c=0;
  [8,12,16,20].forEach(t=>{ if(lm[t].y < lm[t-2].y) c++; });
  return c;
}
function updateDialByHand(lm){
  const p=lm[8];
  if(p.x>.72 || p.y>.45) return;
  const cx=.16, cy=.68;
  const a=Math.atan2(p.y-cy,p.x-cx);
  let idx=0;
  if(a<-1.25) idx=0;
  else if(a<-.15) idx=1;
  else if(a<1.0) idx=2;
  else if(a<2.25) idx=3;
  else idx=4;
  const modes=['off','major','minor','chord','scale'];
  setMode(modes[idx]);
}
function setMode(m){
  currentMode=m;
  document.querySelectorAll('.seg').forEach(s=>s.classList.toggle('active',s.dataset.mode===m));
  document.getElementById('dialText').textContent=m.toUpperCase();
  document.getElementById('hChord').textContent=m.toUpperCase();
}
document.querySelectorAll('.seg').forEach(s=>s.onclick=()=>setMode(s.dataset.mode));
holdBtn.onclick=()=>{hold=!hold;holdBtn.textContent=hold?'HOLD ON':'HOLD OFF'};

function resize(){
  canvas.width=innerWidth*devicePixelRatio;
  canvas.height=innerHeight*devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
addEventListener('resize',resize); resize();

function drawHand(lm,color){
  ctx.strokeStyle=color; ctx.lineWidth=3; ctx.fillStyle=color;
  const lines=[[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20],[5,9,13,17]];
  lines.forEach(line=>{
    ctx.beginPath();
    line.forEach((i,j)=>{
      const x=(1-lm[i].x)*innerWidth, y=lm[i].y*innerHeight;
      j?ctx.lineTo(x,y):ctx.moveTo(x,y);
    });
    ctx.stroke();
  });
  lm.forEach((p,i)=>{
    const x=(1-p.x)*innerWidth,y=p.y*innerHeight;
    ctx.beginPath();ctx.arc(x,y,[4,8,12,16,20].includes(i)?5:3,0,Math.PI*2);ctx.fill();
  });
}

function onResults(results){
  ctx.clearRect(0,0,innerWidth,innerHeight);
  const hands = results.multiHandLandmarks || [];
  document.getElementById('hHands').textContent=hands.length;

  if(!hands.length){
    pointer.style.display='none';
    if(!hold && gain) gain.gain.setTargetAtTime(0,audioCtx.currentTime,.05);
    stopChord();
    document.getElementById('hVolume').textContent='0%';
    return;
  }

  hands.forEach((lm,i)=>drawHand(lm,i===0?'rgba(72,168,255,.85)':'rgba(255,154,68,.85)'));

  const lm=hands[0];
  const tip=lm[8];
  const px=(1-tip.x)*innerWidth, py=tip.y*innerHeight;
  pointer.style.display='block'; pointer.style.left=px+'px'; pointer.style.top=py+'px';

  updateDialByHand(lm);

  const pinch=isPinch(lm);
  const open=fingersOpen(lm);
  const midi=midiFromY(tip.y);
  const note=notes.find(n=>n.midi===midi) || notes[12];
  const volume = Math.max(0.03, Math.min(.22, .04 + (1-tip.y)*.18));

  document.getElementById('hMelody').textContent=note.name;
  document.getElementById('hPitch').textContent=Math.round(note.freq)+' Hz';
  document.getElementById('hVolume').textContent=Math.round(volume*450)+'%';
  setActiveKey(midi);

  const shouldSound = pinch || currentMode==='scale' || hold;
  if(currentMode==='off' && !hold){
    if(gain) gain.gain.setTargetAtTime(0,audioCtx.currentTime,.05);
    stopChord();
    return;
  }

  if(shouldSound){
    let freq=note.freq;
    if(currentMode==='scale') freq = note.freq * (open ? Math.pow(2,open/12) : 1);
    setMainSound(freq,volume);
    if((currentMode==='chord'||currentMode==='major'||currentMode==='minor') && (currentMidi!==midi || performance.now()-lastSound>700)){
      playChord(note.freq,currentMode==='minor');
      lastSound=performance.now();
    }
  }else{
    if(gain) gain.gain.setTargetAtTime(0,audioCtx.currentTime,.05);
    stopChord();
  }
  currentMidi=midi;
}

async function start(){
  showMsg('카메라 권한을 확인하는 중...');
  ensureAudio();
  await audioCtx.resume();
  const hands = new Hands({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:.65,
    minTrackingConfidence:.65
  });
  hands.onResults(onResults);

  const cam = new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:1280,height:720
  });
  await cam.start();
  document.getElementById('start').style.display='none';
  hideMsg();
}
document.getElementById('startBtn').onclick=()=>start().catch(e=>{
  console.error(e);
  showMsg('카메라 실행 실패: 권한을 허용했는지 확인해줘.');
});
</script>
</body>
</html>
