<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Sound ver 1.6.2</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

#wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

#version {
  position: absolute;
  top: 10px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
  opacity: 0.9;
}

#statusPanel {
  position: absolute;
  top: 32px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
}

#status {
  padding: 7px 11px;
  border-radius: 999px;
  background: rgba(0,0,0,0.4);
  margin-bottom: 8px;
}

#playBtn {
  border: 1px solid rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.14);
  color: white;
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
}

#playBtn.on {
  background: rgba(0,255,110,0.28);
  border-color: rgba(0,255,120,0.9);
}

#pitchBar {
  position: absolute;
  right: 24px;
  top: 10%;
  width: 20px;
  height: 80%;
  z-index: 25;
  border-radius: 999px;
  overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.95);
  box-shadow: 0 0 16px rgba(255,255,255,0.45);
  background: white;
}

.noteCell {
  height: calc(100% / 23);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6px;
  font-weight: bold;
  line-height: 1;
  border-bottom: 1px solid rgba(90,90,90,0.45);
}

.noteCell.white {
  background: #fff;
  color: #111;
}

.noteCell.black {
  background: #050505;
  color: #fff;
}

.noteCell.active {
  background: #ff2626 !important;
  color: white !important;
  box-shadow:
    inset 0 0 10px rgba(255,255,255,0.95),
    inset 0 0 18px rgba(255,0,0,0.95),
    0 0 18px rgba(255,0,0,0.95);
  text-shadow: 0 0 6px rgba(255,255,255,0.9);
}

#octaveBox {
  position: absolute;
  right: 50px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 30;
  color: white;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,0,0,0.45);
}

#noteBox {
  position: absolute;
  right: 50px;
  top: calc(50% - 42px);
  z-index: 30;
  color: white;
  font-size: 13px;
  font-weight: bold;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,0,0,0.5);
  text-shadow: 0 0 8px rgba(255,255,255,0.7);
}

@media (orientation: landscape) and (max-width: 900px) {
  #pitchBar {
    right: 14px;
    top: 7%;
    height: 86%;
    width: 20px;
  }

  #octaveBox {
    right: 42px;
    font-size: 12px;
    padding: 5px 9px;
  }

  #noteBox {
    right: 42px;
    top: calc(50% - 40px);
    font-size: 12px;
    padding: 5px 9px;
  }

  #statusPanel {
    top: 30px;
    left: 10px;
  }

  #playBtn {
    padding: 9px 18px;
    font-size: 14px;
  }
}
</style>
</head>

<body>
<div id="wrap">
  <video id="video" autoplay playsinline></video>

  <div id="pitchBar"></div>
  <div id="noteBox">-</div>
  <div id="octaveBox">옥타브 x1</div>

  <canvas id="canvas"></canvas>

  <div id="version">ver 1.6.2</div>

  <div id="statusPanel">
    <div id="status">손을 카메라에 비춰주세요</div>
    <button id="playBtn">손타마톤</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");
const playBtn = document.getElementById("playBtn");
const pitchBar = document.getElementById("pitchBar");
const octaveBox = document.getElementById("octaveBox");
const noteBox = document.getElementById("noteBox");

const fingertipIds = [4, 8, 12, 16, 20];
const baseJointIds = [1, 5, 9, 13, 17];

const scaleNotes = [
  { name: "파", freq: 698.46, black: false },
  { name: "미", freq: 659.25, black: false },
  { name: "레♯", freq: 622.25, black: true },
  { name: "레", freq: 587.33, black: false },
  { name: "도♯", freq: 554.37, black: true },
  { name: "도", freq: 523.25, black: false },
  { name: "시", freq: 493.88, black: false },
  { name: "라♯", freq: 466.16, black: true },
  { name: "라", freq: 440.00, black: false },
  { name: "솔♯", freq: 415.30, black: true },
  { name: "솔", freq: 392.00, black: false },
  { name: "파♯", freq: 369.99, black: true },
  { name: "파", freq: 349.23, black: false },
  { name: "미", freq: 329.63, black: false },
  { name: "레♯", freq: 311.13, black: true },
  { name: "레", freq: 293.66, black: false },
  { name: "도♯", freq: 277.18, black: true },
  { name: "도", freq: 261.63, black: false },
  { name: "시", freq: 246.94, black: false },
  { name: "라♯", freq: 233.08, black: true },
  { name: "라", freq: 220.00, black: false },
  { name: "솔♯", freq: 207.65, black: true },
  { name: "솔", freq: 196.00, black: false }
];

let audioCtx = null;
let osc = null;
let gain = null;
let playMode = false;
let currentFreq = 440;
let octaveLevel = 0;
let currentNoteName = "-";

let clapCooldown = 0;
let clapRipples = [];

function buildPitchBar() {
  pitchBar.innerHTML = "";

  scaleNotes.forEach((note, index) => {
    const cell = document.createElement("div");
    cell.className = `noteCell ${note.black ? "black" : "white"}`;
    cell.dataset.index = index;
    cell.textContent = note.name;
    pitchBar.appendChild(cell);
  });
}
buildPitchBar();

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function point(lm) {
  return {
    x: lm.x * canvas.width,
    y: lm.y * canvas.height
  };
}

function screenX(landmarks) {
  return canvas.width - point(landmarks[0]).x;
}

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function drawPoint(p, r = 7) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function drawLine(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function palmCenter(landmarks) {
  const ids = [0, 5, 9, 13, 17];
  let x = 0, y = 0;

  ids.forEach(id => {
    x += landmarks[id].x;
    y += landmarks[id].y;
  });

  return {
    x: (x / ids.length) * canvas.width,
    y: (y / ids.length) * canvas.height
  };
}

function handSize(landmarks) {
  const wrist = point(landmarks[0]);
  const middleBase = point(landmarks[9]);
  return Math.max(dist(wrist, middleBase), 1);
}

function drawHand(landmarks) {
  const wrist = point(landmarks[0]);

  for (let i = 0; i < 5; i++) {
    const base = point(landmarks[baseJointIds[i]]);
    const tip = point(landmarks[fingertipIds[i]]);

    drawLine(wrist, base);
    drawLine(base, tip);

    drawPoint(base, 6);
    drawPoint(tip, 7);
  }

  drawPoint(wrist, 7);
}

function addClapRipple(x, y) {
  clapRipples.push({
    x,
    y,
    r: 12,
    alpha: 1
  });
}

function drawClapRipples() {
  clapRipples.forEach(ripple => {
    ctx.beginPath();
    ctx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${ripple.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    ripple.r += 7;
    ripple.alpha -= 0.045;
  });

  clapRipples = clapRipples.filter(ripple => ripple.alpha > 0);
}

function initAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = currentFreq;
  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
}

function setSound(active) {
  if (!audioCtx || !gain) return;

  const now = audioCtx.currentTime;
  gain.gain.cancelScheduledValues(now);
  gain.gain.setTargetAtTime(active ? 0.22 : 0, now, 0.03);
}

function setFrequency(freq) {
  currentFreq = freq;
  if (osc && audioCtx) {
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.035);
  }
}

function yToNoteIndex(y) {
  const top = canvas.height * 0.10;
  const bottom = canvas.height * 0.90;
  const clamped = Math.min(Math.max(y, top), bottom);
  const local = (clamped - top) / (bottom - top);
  return Math.round(local * (scaleNotes.length - 1));
}

function updatePitchBar(noteIndex) {
  const cells = document.querySelectorAll(".noteCell");

  cells.forEach((cell, index) => {
    cell.classList.toggle("active", index === noteIndex);
  });
}

function detectStrictPinch(landmarks) {
  const thumbTip = point(landmarks[4]);
  const indexTip = point(landmarks[8]);
  const wrist = point(landmarks[0]);
  const indexBase = point(landmarks[5]);
  const handSizeValue = Math.max(dist(wrist, indexBase), 1);

  return dist(thumbTip, indexTip) < handSizeValue * 0.42;
}

function isLeftSideHand(landmarks) {
  return screenX(landmarks) < canvas.width * 0.5;
}

function isRightSideHand(landmarks) {
  return screenX(landmarks) >= canvas.width * 0.5;
}

function detectClap(hand1, hand2) {
  const c1 = palmCenter(hand1);
  const c2 = palmCenter(hand2);

  const avgSize = (handSize(hand1) + handSize(hand2)) / 2;
  const palmDistance = dist(c1, c2);

  return palmDistance < avgSize * 1.05;
}

function getClapSide(hand1, hand2) {
  const x1 = screenX(hand1);
  const x2 = screenX(hand2);
  const x = (x1 + x2) / 2;

  return x < canvas.width * 0.5 ? "left" : "right";
}

function updateOctave(delta) {
  octaveLevel = Math.max(-2, Math.min(2, octaveLevel + delta));
  updateOctaveText();
}

function updateOctaveText() {
  if (octaveLevel === 0) {
    octaveBox.textContent = "옥타브 x1";
  } else if (octaveLevel > 0) {
    octaveBox.textContent = `옥타브 x${Math.pow(2, octaveLevel)}`;
  } else {
    octaveBox.textContent = `옥타브 x1/${Math.pow(2, Math.abs(octaveLevel))}`;
  }
}

playBtn.addEventListener("click", async () => {
  initAudio();

  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }

  playMode = !playMode;
  playBtn.classList.toggle("on", playMode);
  playBtn.textContent = playMode ? "손타마톤 ON" : "손타마톤";

  if (!playMode) setSound(false);
});

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawClapRipples();

  let leftIndexY = null;
  let rightPinch = false;
  let octaveChanged = false;

  const handsList = results.multiHandLandmarks || [];

  handsList.forEach(hand => {
    drawHand(hand);

    if (isLeftSideHand(hand)) {
      leftIndexY = point(hand[8]).y;
    }

    if (isRightSideHand(hand)) {
      rightPinch = detectStrictPinch(hand);
    }
  });

  if (handsList.length === 2) {
    const [h1, h2] = handsList;
    const now = Date.now();

    if (detectClap(h1, h2) && now > clapCooldown) {
      const side = getClapSide(h1, h2);
      const c1 = palmCenter(h1);
      const c2 = palmCenter(h2);

      if (side === "left") {
        updateOctave(-1);
      } else {
        updateOctave(1);
      }

      addClapRipple(
        (c1.x + c2.x) / 2,
        (c1.y + c2.y) / 2
      );

      clapCooldown = now + 900;
      octaveChanged = true;
    }
  }

  if (leftIndexY !== null) {
    const noteIndex = yToNoteIndex(leftIndexY);
    const note = scaleNotes[noteIndex];
    const freq = note.freq * Math.pow(2, octaveLevel);

    currentNoteName = note.name;
    noteBox.textContent = currentNoteName;

    setFrequency(freq);
    updatePitchBar(noteIndex);
  }

  const shouldSound = playMode && leftIndexY !== null && rightPinch;
  setSound(shouldSound);

  if (handsList.length === 0) {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  } else if (octaveChanged) {
    statusBox.textContent = "박수로 옥타브 변경됨";
  } else if (shouldSound) {
    statusBox.textContent = `연주 중 · ${currentNoteName}`;
  } else if (playMode) {
    statusBox.textContent = "오른쪽 손 엄지+검지를 완전히 붙이면 소리";
  } else {
    statusBox.textContent = "손동작 인식 중";
  }
}

const hands = new Hands({
  locateFile: file => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.65
});

hands.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start()
  .then(() => {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  })
  .catch(() => {
    statusBox.textContent = "카메라 권한을 허용해 주세요";
  });
</script>
</body>
</html>
