<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>손으로말해요 ver 1.8</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

#wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

#version {
  position: absolute;
  top: 10px;
  right: 12px;
  z-index: 40;
  color: white;
  font-size: 12px;
  opacity: 0.9;
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(0,0,0,0.28);
  backdrop-filter: blur(6px);
}

#homePanel {
  position: absolute;
  left: 12px;
  top: 12px;
  transform: none;
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.homeBtn {
  border: 1px solid rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.14);
  color: white;
  border-radius: 999px;
  padding: 9px 16px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  backdrop-filter: blur(8px);
}

.homeBtn.on {
  background: rgba(0,255,120,0.28);
  border-color: rgba(0,255,120,0.95);
}

#statusPanel {
  position: absolute;
  top: 104px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
  display: none;
}

#status {
  padding: 7px 11px;
  border-radius: 999px;
  background: rgba(0,0,0,0.4);
  margin-bottom: 8px;
}

#pitchBar {
  position: absolute;
  right: 24px;
  top: 10%;
  width: 20px;
  height: 80%;
  z-index: 25;
  border-radius: 999px;
  overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.95);
  box-shadow: 0 0 16px rgba(255,255,255,0.45);
  background: white;
  display: none;
}

.noteCell {
  height: calc(100% / 23);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6px;
  font-weight: bold;
  line-height: 1;
  border-bottom: 1px solid rgba(90,90,90,0.45);
}

.noteCell.white { background: #fff; color: #111; }
.noteCell.black { background: #050505; color: #fff; }

.noteCell.active {
  background: #ff2626 !important;
  color: white !important;
  box-shadow:
    inset 0 0 10px rgba(255,255,255,0.95),
    inset 0 0 18px rgba(255,0,0,0.95),
    0 0 18px rgba(255,0,0,0.95);
  text-shadow: 0 0 6px rgba(255,255,255,0.9);
}

#octaveBox, #noteBox {
  position: absolute;
  right: 50px;
  z-index: 30;
  color: white;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,0,0,0.45);
  display: none;
}

#octaveBox {
  top: 50%;
  transform: translateY(-50%);
}

#noteBox {
  top: calc(50% - 42px);
  font-weight: bold;
  background: rgba(255,0,0,0.5);
  text-shadow: 0 0 8px rgba(255,255,255,0.7);
}

#guitarUI {
  position: absolute;
  inset: 0;
  z-index: 20;
  display: none;
  pointer-events: none;
}

#guitarBg {
  display: none;
}

#guitarNeck {
  position: absolute;
  left: 8%;
  right: 8%;
  bottom: 16%;
  height: 25%;
  background: transparent;
  box-shadow: none;
}

.guitarString {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: rgba(235,235,235,0.85);
  box-shadow: 0 0 6px rgba(255,255,255,0.75);
}

.guitarString.active {
  background: #ff3333;
  height: 4px;
  box-shadow: 0 0 16px rgba(255,0,0,1);
}

#chordArea {
  position: absolute;
  left: 8%;
  right: 8%;
  bottom: 8%;
  height: 34%;
  display: flex;
  gap: 8px;
}

.chordPad {
  flex: 1;
  position: relative;
  color: white;
  font-size: 20px;
  text-align: center;
  padding-top: 12px;
  background: rgba(0,0,0,0.28);
  border: 1px solid rgba(255,255,255,0.32);
  border-radius: 18px;
  backdrop-filter: blur(5px);
}

.chordPad.active {
  background: rgba(255,50,50,0.58);
  box-shadow: 0 0 18px rgba(255,0,0,0.9);
}

#playZone {
  position: absolute;
  top: 8%;
  right: 8%;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.75);
  color: white;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.38);
}

#playZone.active {
  background: rgba(255,0,0,0.65);
  box-shadow: 0 0 22px rgba(255,0,0,0.95);
}

#autoDial {
  position: absolute;
  top: 10%;
  right: 18%;
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: rgba(0,0,0,0.42);
  border: 2px solid rgba(255,255,255,0.5);
  color: white;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#autoDial::after {
  content: "";
  position: absolute;
  width: 6px;
  height: 26px;
  border-radius: 999px;
  background: rgba(255,255,255,0.9);
  top: 8px;
  transform-origin: 3px 38px;
  transform: rotate(var(--dial-rot, 0deg));
}

#guitarStatus {
  position: absolute;
  top: 104px;
  left: 12px;
  color: white;
  font-size: 12px;
  padding: 7px 11px;
  border-radius: 999px;
  background: rgba(0,0,0,0.45);
}

@media (orientation: landscape) and (max-width: 900px) {
  #pitchBar {
    right: 14px;
    top: 7%;
    height: 86%;
    width: 20px;
  }

  #octaveBox, #noteBox {
    right: 42px;
    font-size: 12px;
    padding: 5px 9px;
  }

  #noteBox { top: calc(50% - 40px); }

  .homeBtn {
    padding: 8px 14px;
    font-size: 13px;
  }

  .chordPad {
    font-size: 16px;
    padding-top: 8px;
  }

  #playZone {
    width: 70px;
    height: 70px;
  }

  #autoDial {
    width: 74px;
    height: 74px;
    right: 20%;
  }
}
</style>
</head>

<body>
<div id="wrap">
  <video id="video" autoplay playsinline></video>

  <div id="pitchBar"></div>
  <div id="noteBox">-</div>
  <div id="octaveBox">옥타브 x1</div>

  <div id="guitarUI">
    <div id="guitarBg"></div>
    <div id="guitarNeck"></div>
    <div id="chordArea"></div>
    <div id="autoDial">자동<br>재생</div>
    <div id="playZone">PLAY</div>
    <div id="guitarStatus">기타 모드</div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="version">손으로말해요 · ver 1.8</div>

  <div id="statusPanel">
    <div id="status">손을 카메라에 비춰주세요</div>
  </div>

  <div id="homePanel">
    <button id="handBtn" class="homeBtn">손타마톤</button>
    <button id="guitarBtn" class="homeBtn">기타</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");
const statusPanel = document.getElementById("statusPanel");
const handBtn = document.getElementById("handBtn");
const guitarBtn = document.getElementById("guitarBtn");

const pitchBar = document.getElementById("pitchBar");
const octaveBox = document.getElementById("octaveBox");
const noteBox = document.getElementById("noteBox");

const guitarUI = document.getElementById("guitarUI");
const guitarNeck = document.getElementById("guitarNeck");
const chordArea = document.getElementById("chordArea");
const playZone = document.getElementById("playZone");
const autoDial = document.getElementById("autoDial");
const guitarStatus = document.getElementById("guitarStatus");

const fingertipIds = [4, 8, 12, 16, 20];
const baseJointIds = [1, 5, 9, 13, 17];

let mode = "home";

const scaleNotes = [
  { name: "파", freq: 698.46, black: false },
  { name: "미", freq: 659.25, black: false },
  { name: "레♯", freq: 622.25, black: true },
  { name: "레", freq: 587.33, black: false },
  { name: "도♯", freq: 554.37, black: true },
  { name: "도", freq: 523.25, black: false },
  { name: "시", freq: 493.88, black: false },
  { name: "라♯", freq: 466.16, black: true },
  { name: "라", freq: 440.00, black: false },
  { name: "솔♯", freq: 415.30, black: true },
  { name: "솔", freq: 392.00, black: false },
  { name: "파♯", freq: 369.99, black: true },
  { name: "파", freq: 349.23, black: false },
  { name: "미", freq: 329.63, black: false },
  { name: "레♯", freq: 311.13, black: true },
  { name: "레", freq: 293.66, black: false },
  { name: "도♯", freq: 277.18, black: true },
  { name: "도", freq: 261.63, black: false },
  { name: "시", freq: 246.94, black: false },
  { name: "라♯", freq: 233.08, black: true },
  { name: "라", freq: 220.00, black: false },
  { name: "솔♯", freq: 207.65, black: true },
  { name: "솔", freq: 196.00, black: false }
];

const guitarChords = [
  { name: "Em", notes: [164.81, 196.00, 246.94, 329.63, 392.00, 659.25] },
  { name: "Am", notes: [220.00, 261.63, 329.63, 440.00, 523.25, 659.25] },
  { name: "Dm", notes: [146.83, 220.00, 293.66, 349.23, 440.00, 587.33] },
  { name: "G", notes: [196.00, 246.94, 293.66, 392.00, 493.88, 783.99] },
  { name: "C", notes: [130.81, 196.00, 261.63, 329.63, 392.00, 523.25] },
  { name: "F", notes: [174.61, 220.00, 261.63, 349.23, 440.00, 698.46] },
  { name: "B♭", notes: [116.54, 174.61, 233.08, 293.66, 349.23, 466.16] },
  { name: "Bdim", notes: [123.47, 174.61, 246.94, 293.66, 349.23, 493.88] },
  { name: "E", notes: [164.81, 207.65, 246.94, 329.63, 415.30, 659.25] },
  { name: "A♭", notes: [207.65, 261.63, 311.13, 415.30, 523.25, 830.61] },
  { name: "Fm", notes: [174.61, 207.65, 261.63, 349.23, 415.30, 698.46] },
  { name: "Gm", notes: [196.00, 233.08, 293.66, 392.00, 466.16, 783.99] }
];

let audioCtx = null;
let osc = null;
let gain = null;
let playMode = false;
let currentFreq = 440;
let octaveLevel = 0;
let currentNoteName = "-";

let clapCooldown = 0;
let clapRipples = [];

let selectedChordIndex = 0;
let selectedStringIndex = 2;
let guitarCooldown = 0;
let autoPlayLevel = 0;
let autoTimer = 0;
let autoLastTime = 0;

// ver 1.8: 손가락 인식 안정화용 상태값
let smoothLeftIndexY = null;
let pinchStableFrames = 0;
let lastLeftIndexY = null;
let lastLeftSeenTime = 0;
let pendingChordIndex = null;
let pendingChordFrames = 0;
let pendingStringIndex = null;
let pendingStringFrames = 0;
const SMOOTHING = 0.68;
const PINCH_REQUIRED_FRAMES = 2;
const SELECT_REQUIRED_FRAMES = 2;
const LOST_HAND_GRACE_MS = 180;

function buildPitchBar() {
  pitchBar.innerHTML = "";
  scaleNotes.forEach((note, index) => {
    const cell = document.createElement("div");
    cell.className = `noteCell ${note.black ? "black" : "white"}`;
    cell.dataset.index = index;
    cell.textContent = note.name;
    pitchBar.appendChild(cell);
  });
}

function buildGuitarUI() {
  chordArea.innerHTML = "";
  guitarNeck.innerHTML = "";

  for (let i = 0; i < 6; i++) {
    const s = document.createElement("div");
    s.className = "guitarString";
    s.style.top = `${12 + i * 16}%`;
    s.dataset.string = i;
    guitarNeck.appendChild(s);
  }

  guitarChords.forEach((chord, index) => {
    const pad = document.createElement("div");
    pad.className = "chordPad";
    pad.dataset.index = index;
    pad.textContent = chord.name;
    chordArea.appendChild(pad);
  });
}

buildPitchBar();
buildGuitarUI();

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function setMode(nextMode) {
  mode = nextMode;

  handBtn.classList.toggle("on", mode === "hand");
  guitarBtn.classList.toggle("on", mode === "guitar");

  const handVisible = mode === "hand";
  const guitarVisible = mode === "guitar";

  statusPanel.style.display = handVisible ? "block" : "none";
  pitchBar.style.display = handVisible ? "block" : "none";
  octaveBox.style.display = handVisible ? "block" : "none";
  noteBox.style.display = handVisible ? "block" : "none";
  guitarUI.style.display = guitarVisible ? "block" : "none";

  playMode = handVisible;
  setSound(false);
  if (mode === "home") {
    smoothLeftIndexY = null;
    pinchStableFrames = 0;
  }
}

handBtn.addEventListener("click", async () => {
  initAudio();
  if (audioCtx.state === "suspended") await audioCtx.resume();
  setMode(mode === "hand" ? "home" : "hand");
});

guitarBtn.addEventListener("click", async () => {
  initAudio();
  if (audioCtx.state === "suspended") await audioCtx.resume();
  setMode(mode === "guitar" ? "home" : "guitar");
});

function point(lm) {
  return { x: lm.x * canvas.width, y: lm.y * canvas.height };
}

function screenPoint(lm) {
  return { x: canvas.width - lm.x * canvas.width, y: lm.y * canvas.height };
}

function screenX(landmarks) {
  return screenPoint(landmarks[0]).x;
}

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function lerp(prev, next, amount) {
  if (prev === null || Number.isNaN(prev)) return next;
  return prev * amount + next * (1 - amount);
}

function stableSetCandidate(value, current, pending, frames) {
  if (value === current) return { current, pending: null, frames: 0 };
  if (pending === value) frames += 1;
  else { pending = value; frames = 1; }
  if (frames >= SELECT_REQUIRED_FRAMES) {
    current = value;
    pending = null;
    frames = 0;
  }
  return { current, pending, frames };
}

function drawPoint(p, r = 7) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function drawLine(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function palmCenter(landmarks) {
  const ids = [0, 5, 9, 13, 17];
  let x = 0, y = 0;
  ids.forEach(id => {
    x += landmarks[id].x;
    y += landmarks[id].y;
  });
  return { x: (x / ids.length) * canvas.width, y: (y / ids.length) * canvas.height };
}

function handSize(landmarks) {
  return Math.max(dist(point(landmarks[0]), point(landmarks[9])), 1);
}

function drawHand(landmarks) {
  const wrist = point(landmarks[0]);

  for (let i = 0; i < 5; i++) {
    const base = point(landmarks[baseJointIds[i]]);
    const tip = point(landmarks[fingertipIds[i]]);
    drawLine(wrist, base);
    drawLine(base, tip);
    drawPoint(base, 6);
    drawPoint(tip, 7);
  }

  drawPoint(wrist, 7);
}

function addClapRipple(x, y) {
  clapRipples.push({ x, y, r: 12, alpha: 1 });
}

function drawClapRipples() {
  clapRipples.forEach(ripple => {
    ctx.beginPath();
    ctx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${ripple.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    ripple.r += 7;
    ripple.alpha -= 0.045;
  });
  clapRipples = clapRipples.filter(ripple => ripple.alpha > 0);
}

function initAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = currentFreq;
  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
}

function setSound(active) {
  if (!audioCtx || !gain) return;
  const now = audioCtx.currentTime;
  gain.gain.cancelScheduledValues(now);
  gain.gain.setTargetAtTime(active ? 0.22 : 0, now, 0.03);
}

function setFrequency(freq) {
  currentFreq = freq;
  if (osc && audioCtx) {
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.035);
  }
}

function playGuitarNote(freq) {
  if (!audioCtx) return;

  const now = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o1.type = "triangle";
  o2.type = "sine";
  o1.frequency.value = freq;
  o2.frequency.value = freq * 2.01;

  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.25, now + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);

  o1.connect(g);
  o2.connect(g);
  g.connect(audioCtx.destination);

  o1.start(now);
  o2.start(now);
  o1.stop(now + 0.6);
  o2.stop(now + 0.6);
}

function playGuitarString() {
  const chord = guitarChords[selectedChordIndex];
  const freq = chord.notes[selectedStringIndex] || chord.notes[0];
  playGuitarNote(freq);
}

function yToNoteIndex(y) {
  const top = canvas.height * 0.10;
  const bottom = canvas.height * 0.90;
  const clamped = Math.min(Math.max(y, top), bottom);
  const local = (clamped - top) / (bottom - top);
  return Math.round(local * (scaleNotes.length - 1));
}

function updatePitchBar(noteIndex) {
  document.querySelectorAll(".noteCell").forEach((cell, index) => {
    cell.classList.toggle("active", index === noteIndex);
  });
}

function detectStrictPinch(landmarks) {
  const thumbTip = point(landmarks[4]);
  const indexTip = point(landmarks[8]);
  const handSizeValue = Math.max(dist(point(landmarks[0]), point(landmarks[5])), 1);
  return dist(thumbTip, indexTip) < handSizeValue * 0.34;
}

function isLeftSideHand(landmarks) {
  return screenX(landmarks) < canvas.width * 0.5;
}

function isRightSideHand(landmarks) {
  return screenX(landmarks) >= canvas.width * 0.5;
}

function detectClap(hand1, hand2) {
  const avgSize = (handSize(hand1) + handSize(hand2)) / 2;
  return dist(palmCenter(hand1), palmCenter(hand2)) < avgSize * 1.05;
}

function getClapSide(hand1, hand2) {
  const x = (screenX(hand1) + screenX(hand2)) / 2;
  return x < canvas.width * 0.5 ? "left" : "right";
}

function updateOctave(delta) {
  octaveLevel = Math.max(-2, Math.min(2, octaveLevel + delta));
  updateOctaveText();
}

function updateOctaveText() {
  if (octaveLevel === 0) octaveBox.textContent = "옥타브 x1";
  else if (octaveLevel > 0) octaveBox.textContent = `옥타브 x${Math.pow(2, octaveLevel)}`;
  else octaveBox.textContent = `옥타브 x1/${Math.pow(2, Math.abs(octaveLevel))}`;
}

function rectOf(el) {
  return el.getBoundingClientRect();
}

function inRect(p, r, margin = 0) {
  return p.x >= r.left - margin && p.x <= r.right + margin && p.y >= r.top - margin && p.y <= r.bottom + margin;
}

function updateGuitarSelection(leftHand) {
  const p = screenPoint(leftHand[8]);
  const area = rectOf(chordArea);
  const neck = rectOf(guitarNeck);

  if (inRect(p, area, 12)) {
    const localX = Math.min(Math.max(p.x - area.left, 0), area.width);
    const chordCandidate = Math.min(guitarChords.length - 1, Math.floor(localX / (area.width / guitarChords.length)));
    const stable = stableSetCandidate(chordCandidate, selectedChordIndex, pendingChordIndex, pendingChordFrames);
    selectedChordIndex = stable.current;
    pendingChordIndex = stable.pending;
    pendingChordFrames = stable.frames;
  }

  if (inRect(p, neck, 28)) {
    const localY = Math.min(Math.max(p.y - neck.top, 0), neck.height);
    const stringCandidate = Math.min(5, Math.max(0, Math.round((localY / neck.height) * 5)));
    const stable = stableSetCandidate(stringCandidate, selectedStringIndex, pendingStringIndex, pendingStringFrames);
    selectedStringIndex = stable.current;
    pendingStringIndex = stable.pending;
    pendingStringFrames = stable.frames;
  }

  document.querySelectorAll(".chordPad").forEach((pad, index) => {
    pad.classList.toggle("active", index === selectedChordIndex);
  });

  document.querySelectorAll(".guitarString").forEach((s, index) => {
    s.classList.toggle("active", index === selectedStringIndex);
  });
}

function updateAutoDial(rightHand) {
  const thumb = screenPoint(rightHand[4]);
  const index = screenPoint(rightHand[8]);
  const knob = rectOf(autoDial);
  const center = { x: knob.left + knob.width / 2, y: knob.top + knob.height / 2 };

  const pinchClose = dist(thumb, index) < Math.max(handSize(rightHand) * 0.32, 16);
  const indexNearKnob = dist(index, center) < knob.width * 0.52;

  if (pinchClose && indexNearKnob) {
    const ang = Math.atan2(index.y - center.y, index.x - center.x);
    let deg = ang * 180 / Math.PI + 90;
    if (deg < 0) deg += 360;

    if (deg > 300 || deg < 25) autoPlayLevel = 0;
    else if (deg < 95) autoPlayLevel = 1;
    else if (deg < 180) autoPlayLevel = 2;
    else autoPlayLevel = 3;

    autoDial.style.setProperty("--dial-rot", `${autoPlayLevel * 55}deg`);
  }
}

function handleGuitarPlay(rightHand) {
  const p = screenPoint(rightHand[8]);
  const playR = rectOf(playZone);
  const now = Date.now();

  const playActive = inRect(p, playR, 0);
  playZone.classList.toggle("active", playActive);

  if (playActive && now > guitarCooldown) {
    playGuitarString();
    guitarCooldown = now + 180;
  }
}

function handleAutoPlay() {
  if (autoPlayLevel <= 0) return;

  const now = Date.now();
  const intervals = [0, 850, 520, 320];

  if (now - autoLastTime > intervals[autoPlayLevel]) {
    playGuitarString();
    autoLastTime = now;
  }
}

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const handsList = results.multiHandLandmarks || [];

  if (mode === "home") {
    setSound(false);
    return;
  }

  if (mode === "hand") {
    drawClapRipples();

    let leftIndexY = null;
    let rightPinch = false;
    let octaveChanged = false;

    handsList.forEach(hand => {
      drawHand(hand);

      if (isLeftSideHand(hand)) {
        const rawY = point(hand[8]).y;
        smoothLeftIndexY = lerp(smoothLeftIndexY, rawY, SMOOTHING);
        leftIndexY = smoothLeftIndexY;
        lastLeftIndexY = smoothLeftIndexY;
        lastLeftSeenTime = Date.now();
      }

      if (isRightSideHand(hand) && detectStrictPinch(hand)) {
        rightPinch = true;
      }
    });

    if (leftIndexY === null && lastLeftIndexY !== null && Date.now() - lastLeftSeenTime < LOST_HAND_GRACE_MS) {
      leftIndexY = lastLeftIndexY;
    }

    if (rightPinch) pinchStableFrames += 1;
    else pinchStableFrames = 0;
    rightPinch = pinchStableFrames >= PINCH_REQUIRED_FRAMES;

    if (handsList.length === 2) {
      const [h1, h2] = handsList;
      const now = Date.now();

      if (detectClap(h1, h2) && now > clapCooldown) {
        const side = getClapSide(h1, h2);
        const c1 = palmCenter(h1);
        const c2 = palmCenter(h2);

        updateOctave(side === "left" ? -1 : 1);
        addClapRipple((c1.x + c2.x) / 2, (c1.y + c2.y) / 2);

        clapCooldown = now + 900;
        octaveChanged = true;
      }
    }

    if (leftIndexY !== null) {
      const noteIndex = yToNoteIndex(leftIndexY);
      const note = scaleNotes[noteIndex];
      const freq = note.freq * Math.pow(2, octaveLevel);

      currentNoteName = note.name;
      noteBox.textContent = currentNoteName;

      setFrequency(freq);
      updatePitchBar(noteIndex);
    }

    const shouldSound = playMode && leftIndexY !== null && rightPinch;
    setSound(shouldSound);

    if (handsList.length === 0) statusBox.textContent = "손을 카메라에 비춰주세요";
    else if (octaveChanged) statusBox.textContent = "박수로 옥타브 변경됨";
    else if (shouldSound) statusBox.textContent = `연주 중 · ${currentNoteName}`;
    else statusBox.textContent = "오른쪽 손 엄지+검지를 완전히 붙이면 소리";

    return;
  }

  if (mode === "guitar") {
    setSound(false);

    let leftHand = null;
    let rightHand = null;

    handsList.forEach(hand => {
      drawHand(hand);
      if (isLeftSideHand(hand)) leftHand = hand;
      if (isRightSideHand(hand)) rightHand = hand;
    });

    if (leftHand) updateGuitarSelection(leftHand);
    if (rightHand) {
      handleGuitarPlay(rightHand);
      updateAutoDial(rightHand);
    } else {
      playZone.classList.remove("active");
    }

    handleAutoPlay();

    guitarStatus.textContent =
      `기타 모드 · ${guitarChords[selectedChordIndex].name} · ${selectedStringIndex + 1}번 줄 · 자동 ${autoPlayLevel}`;

    return;
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.65
});

hands.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start()
  .then(() => {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  })
  .catch(() => {
    statusBox.textContent = "카메라 권한을 허용해 주세요";
  });
</script>
</body>
</html>
