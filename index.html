<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Sound ver 1.4</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

#wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

#version {
  position: absolute;
  top: 10px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
  opacity: 0.9;
}

#statusPanel {
  position: absolute;
  top: 32px;
  left: 12px;
  z-index: 30;
  color: white;
  font-size: 12px;
}

#status {
  padding: 7px 11px;
  border-radius: 999px;
  background: rgba(0,0,0,0.4);
  margin-bottom: 8px;
}

#playBtn {
  border: 1px solid rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.14);
  color: white;
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
}

#playBtn.on {
  background: rgba(0,255,110,0.28);
  border-color: rgba(0,255,120,0.9);
}

#pitchBar {
  position: absolute;
  right: 24px;
  top: 20%;
  width: 8px;
  height: 60%;
  z-index: 25;
  background: rgba(255,255,255,0.88);
  border-radius: 999px;
  box-shadow: 0 0 18px rgba(255,255,255,0.55);
}

#pitchDot {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 22px;
  height: 22px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 18px rgba(0,255,120,0.9);
}

#octaveBox {
  position: absolute;
  right: 45px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 30;
  color: white;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,0,0,0.45);
}
</style>
</head>

<body>
<div id="wrap">
  <video id="video" autoplay playsinline></video>

  <div id="pitchBar">
    <div id="pitchDot"></div>
  </div>
  <div id="octaveBox">옥타브 x1</div>

  <canvas id="canvas"></canvas>

  <div id="version">ver 1.4</div>

  <div id="statusPanel">
    <div id="status">손을 카메라에 비춰주세요</div>
    <button id="playBtn">연주</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");
const playBtn = document.getElementById("playBtn");
const pitchDot = document.getElementById("pitchDot");
const octaveBox = document.getElementById("octaveBox");

const fingertipIds = [4, 8, 12, 16, 20];
const baseJointIds = [1, 5, 9, 13, 17];

let audioCtx = null;
let osc = null;
let gain = null;
let playMode = false;
let currentFreq = 440;
let octaveLevel = 0;

let leftWave = createWaveDetector("left");
let rightWave = createWaveDetector("right");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function point(lm) {
  return {
    x: lm.x * canvas.width,
    y: lm.y * canvas.height
  };
}

function dist(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function drawPoint(p, r = 7) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function drawLine(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.strokeStyle = "rgba(0,255,100,0.9)";
  ctx.stroke();
}

function palmCenter(landmarks) {
  const ids = [0, 5, 9, 13, 17];
  let x = 0, y = 0;

  ids.forEach(id => {
    x += landmarks[id].x;
    y += landmarks[id].y;
  });

  return {
    x: (x / ids.length) * canvas.width,
    y: (y / ids.length) * canvas.height
  };
}

function drawHand(landmarks) {
  const wrist = point(landmarks[0]);
  const center = palmCenter(landmarks);

  drawLine(wrist, center);

  for (let i = 0; i < 5; i++) {
    const base = point(landmarks[baseJointIds[i]]);
    const tip = point(landmarks[fingertipIds[i]]);

    drawLine(center, base);
    drawLine(base, tip);

    drawPoint(base, 6);
    drawPoint(tip, 7);
  }

  drawPoint(wrist, 7);
  drawPoint(center, 9);
}

function initAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = currentFreq;
  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
}

function setSound(active) {
  if (!audioCtx || !gain) return;

  const now = audioCtx.currentTime;
  gain.gain.cancelScheduledValues(now);
  gain.gain.setTargetAtTime(active ? 0.12 : 0, now, 0.03);
}

function setFrequency(freq) {
  currentFreq = freq;
  if (osc && audioCtx) {
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.035);
  }
}

function yToFrequency(y) {
  const minFreq = 180;
  const maxFreq = 880;
  const t = 1 - Math.min(Math.max(y / canvas.height, 0), 1);
  const baseFreq = minFreq + (maxFreq - minFreq) * t;
  return baseFreq * Math.pow(2, octaveLevel);
}

function updatePitchBar(y) {
  const top = 0.2;
  const height = 0.6;
  const clamped = Math.min(Math.max(y / canvas.height, top), top + height);
  const local = (clamped - top) / height;
  pitchDot.style.top = `${local * 100}%`;
}

function detectStrictPinch(landmarks) {
  const thumbTip = point(landmarks[4]);
  const indexTip = point(landmarks[8]);
  const wrist = point(landmarks[0]);
  const indexBase = point(landmarks[5]);
  const handSize = Math.max(dist(wrist, indexBase), 1);

  return dist(thumbTip, indexTip) < handSize * 0.42;
}

function isLeftSideHand(landmarks) {
  return point(landmarks[0]).x < canvas.width * 0.5;
}

function isRightSideHand(landmarks) {
  return point(landmarks[0]).x >= canvas.width * 0.5;
}

function createWaveDetector(side) {
  return {
    side,
    lastX: null,
    lastDir: 0,
    changes: 0,
    lastChangeTime: 0,
    cooldownUntil: 0
  };
}

function updateWaveDetector(detector, x) {
  const now = Date.now();

  if (now < detector.cooldownUntil) return false;

  if (detector.lastX === null) {
    detector.lastX = x;
    return false;
  }

  const dx = x - detector.lastX;
  detector.lastX = x;

  const threshold = canvas.width * 0.018;
  if (Math.abs(dx) < threshold) return false;

  const dir = dx > 0 ? 1 : -1;

  if (detector.lastDir !== 0 && dir !== detector.lastDir) {
    if (now - detector.lastChangeTime < 900) {
      detector.changes++;
    } else {
      detector.changes = 1;
    }

    detector.lastChangeTime = now;

    if (detector.changes >= 3) {
      detector.changes = 0;
      detector.cooldownUntil = now + 900;
      return true;
    }
  }

  detector.lastDir = dir;
  return false;
}

function updateOctave(delta) {
  octaveLevel = Math.max(-2, Math.min(2, octaveLevel + delta));
  updateOctaveText();
}

function updateOctaveText() {
  if (octaveLevel === 0) {
    octaveBox.textContent = "옥타브 x1";
  } else if (octaveLevel > 0) {
    octaveBox.textContent = `옥타브 x${Math.pow(2, octaveLevel)}`;
  } else {
    octaveBox.textContent = `옥타브 x1/${Math.pow(2, Math.abs(octaveLevel))}`;
  }
}

playBtn.addEventListener("click", async () => {
  initAudio();

  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }

  playMode = !playMode;
  playBtn.classList.toggle("on", playMode);
  playBtn.textContent = playMode ? "연주 중" : "연주";

  if (!playMode) setSound(false);
});

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let leftIndexY = null;
  let rightPinch = false;
  let octaveChanged = false;

  const handsList = results.multiHandLandmarks || [];

  handsList.forEach(hand => {
    drawHand(hand);

    const wrist = point(hand[0]);

    if (isLeftSideHand(hand)) {
      leftIndexY = point(hand[8]).y;

      if (updateWaveDetector(leftWave, wrist.x)) {
        updateOctave(1);
        octaveChanged = true;
      }
    }

    if (isRightSideHand(hand)) {
      rightPinch = detectStrictPinch(hand);

      if (updateWaveDetector(rightWave, wrist.x)) {
        updateOctave(-1);
        octaveChanged = true;
      }
    }
  });

  if (leftIndexY !== null) {
    const freq = yToFrequency(leftIndexY);
    setFrequency(freq);
    updatePitchBar(leftIndexY);
  }

  const shouldSound = playMode && leftIndexY !== null && rightPinch;
  setSound(shouldSound);

  if (handsList.length === 0) {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  } else if (octaveChanged) {
    statusBox.textContent = "옥타브 변경됨";
  } else if (shouldSound) {
    statusBox.textContent = `연주 중 · ${Math.round(currentFreq)}Hz`;
  } else if (playMode) {
    statusBox.textContent = "오른손 엄지+검지를 완전히 붙이면 소리";
  } else {
    statusBox.textContent = "손동작 인식 중";
  }
}

const hands = new Hands({
  locateFile: file => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.65
});

hands.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start()
  .then(() => {
    statusBox.textContent = "손을 카메라에 비춰주세요";
  })
  .catch(() => {
    statusBox.textContent = "카메라 권한을 허용해 주세요";
  });
</script>
</body>
</html>
